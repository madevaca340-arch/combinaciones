<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Combinaciones Interactivas</title>
<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4e73df,#1cc88a);
    color:white;
    text-align:center;
    padding:30px;
}

.card{
    background: rgba(0,0,0,0.3);
    padding:30px;
    border-radius:15px;
    max-width:900px;
    margin:auto;
}

.box{
    display:inline-block;
    padding:15px;
    margin:10px;
    background:#f6c23e;
    color:black;
    border-radius:10px;
    cursor:grab;
}

.dropzone{
    margin-top:20px;
    min-height:80px;
    border:2px dashed white;
    padding:20px;
    border-radius:10px;
}

button{
    padding:10px 15px;
    margin-top:20px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

#animacion{
    font-size:20px;
    margin-top:15px;
}

</style>
</head>

<body>

<div class="card">

<h1>📚 ¿Qué es una combinación?</h1>

<p>
Una combinación es una forma de elegir elementos de un grupo 
donde <strong>el orden NO cambia el resultado</strong>.
</p>

<h2>🔄 Observa la animación</h2>

<div id="animacion">Camisa - Pantalón</div>

<button onclick="iniciarAnimacion()">Iniciar animación</button>

<hr>

<h2>🎯 Ahora inténtalo tú</h2>
<p>Arrastra dos elementos al recuadro:</p>

<div>
    <div class="box" draggable="true">⚽ Balón</div>
    <div class="box" draggable="true">🎒 Mochila</div>
    <div class="box" draggable="true">📚 Libro</div>
</div>

<div class="dropzone" id="zona">
    Suelta aquí
</div>

<button onclick="verificar()">Verificar</button>

<p id="mensaje"></p>

</div>

<script>

let alternar = false;

function iniciarAnimacion(){
    setInterval(()=>{
        if(alternar){
            document.getElementById("animacion").innerHTML="Camisa - Pantalón";
        } else {
            document.getElementById("animacion").innerHTML="Pantalón - Camisa";
        }
        alternar = !alternar;
    },1000);
}

let seleccionados = [];

document.querySelectorAll(".box").forEach(item=>{
    item.addEventListener("dragstart",function(e){
        e.dataTransfer.setData("text",this.innerText);
    });
});

document.getElementById("zona").addEventListener("dragover",function(e){
    e.preventDefault();
});

document.getElementById("zona").addEventListener("drop",function(e){
    e.preventDefault();
    let dato = e.dataTransfer.getData("text");
    if(seleccionados.length < 2){
        seleccionados.push(dato);
        this.innerHTML += "<br>" + dato;
    }
});

function verificar(){
    if(seleccionados.length === 2){
        document.getElementById("mensaje").innerHTML =
        "✅ Elegiste: " + seleccionados[0] + " y " + seleccionados[1] +
        "<br><br>El orden no cambia el grupo → ¡Es una combinación!";
    } else {
        document.getElementById("mensaje").innerHTML =
        "⚠️ Debes elegir exactamente dos elementos.";
    }
}

</script>

</body>

</html>
